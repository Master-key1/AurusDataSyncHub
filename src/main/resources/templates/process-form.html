<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Aurus Data Sync Hub</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: white;
    }
    .container {
      max-width: 700px;
      margin: 50px auto;
      background: #fff;
      color: #333;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.25);
    }
    h1 {
      text-align: center;
      color: #2a5298;
      margin-bottom: 25px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #1e3c72;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 12px;
      font-size: 14px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    textarea:focus {
      border-color: #2a5298;
      box-shadow: 0 0 8px rgba(42,82,152,0.4);
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2a5298, #1e3c72);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }
    button:hover {
      background: linear-gradient(135deg, #1e3c72, #0f1f3d);
      transform: scale(1.02);
    }
    .msg {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
    }
    .msg.success {
      background: #e0ffe0;
      color: #2e7d32;
    }
    .msg.error {
      background: #ffe0e0;
      color: #c62828;
    }
    @media (max-width: 768px) {
      .container {
        width: 90%;
        padding: 25px;
      }
      textarea {
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Aurus Data Sync Hub</h1>
    <form th:action="@{/ui/process}" th:object="${processRequest}" method="post">
      <label>CCT Request</label>
      <textarea th:field="*{cctRequest}" placeholder="Enter CCT Request"></textarea>
      
      <label>Processor Request</label>
      <textarea th:field="*{processorRequest}" placeholder="Enter Processor Request"></textarea>
      
      <label>Processor Response</label>
      <textarea th:field="*{processorResponse}" placeholder="Enter Processor Response"></textarea>
      
      <label>CCT Response</label>
      <textarea th:field="*{cctResponse}" placeholder="Enter CCT Response"></textarea>
      
      <button type="submit">💾 Save Data</button>
    </form>
    
    <div th:if="${message}" th:classappend="${messageType}" class="msg">
      <p th:text="${message}"></p>
    </div>
  </div>
</body>
</html>
